<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeo de riesgos</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <header class="contFlexCent">
        <nav class="contFlex">
            <!-- Titulo del dashboard -->
            <h1>
                <i class="bi bi-shield-fill-exclamation"></i>
                SIGI (Mapeo de incidentes)
            </h1>
            <!-- Navegacion de los botones -->
            <div class="botonesNav contFlexCent">
                <button id="ini">Inicio</button>
                <button id="estad">Estadisticas</button>
                <button id="iniciarSesion">Iniciar Sesion <i class="bi bi-box-arrow-in-right"></i></button>
            </div>
        </nav>
    </header>
    <main>
        <!-- Boton de filtros con los iconos de boostrap -->
        <button id="btnFiltros">
            <i class="bi bi-sliders"></i>
        </button>
        <button class="restablecer">Restablecer</button>
        <!-- El panel ese de los filtros -->
        <div id="panelFiltros">
            <!-- Boton de cerrar el panel de filtro -->
            <button id="cerrarFiltros">
                <i class="bi bi-x"></i>
            </button>
            <!-- Aqui esta el panel de filtros -->
            <div class="contenedorFiltros">
                <h2>
                    <i class="bi bi-funnel"></i>
                    Filtros de Mapa
                </h2>
                <label>Buscar barrio</label>
                <input type="text" id="buscarBarrio" placeholder="Barrio: Centro, Juan XXIII...">
                <input type="text" id="buscarVereda" placeholder="Vereda: San antonio">
                <!-- div de sugerencias -->
                <div id="sugerencias"></div>
                <label>Tipo de Incidente</label>
                <!-- Botones por filtro de incidente -->
                <div class="tiposIncidente">
                    <button class="incidente robo" data-id="1">
                        <span></span> Robo
                    </button>
                    <button class="incidente agresion" data-id="2">
                        <span></span> Agresiones
                    </button>
                    <button class="incidente piques" data-id="3">
                        <span></span> Piques
                    </button>
                    <button class="incidente accidente" data-id="4">
                        <span></span> Accidentes
                    </button>
                </div>
                <!-- Aqui boton para actualizar -->
                <button class="btnActualizar">
                    Actualizar Resultados
                </button>
            </div>
        </div>
        <!-- Aqui mostramos el mapa -->
        <div id="map"></div>
        <!-- Este contenedor es para ver los colores de los tipo de incidentes -->
        <div class="leyenda contFlexCent">
            <div class="itemLeyenda">
                <span class="rojo"></span> Robo
            </div>
            <div class="itemLeyenda">
                <span class="morado"></span> Piques
            </div>
            <div class="itemLeyenda">
                <span class="amarillo"></span> Agresiones/Amenazas
            </div>
            <div class="itemLeyenda">
                <span class="verde"></span> Accidente de tránsito
            </div>
        </div>
    </main>
    <div id="estadisticas" class="esconder">
        <div class="resumen">
            <div class="tpincidentes">
                <p class="robo">Robos</p>
                <p class="accidente">Accidentes</p>
                <p class="pique">Piques</p>
                <p class="agresion">Agresiones</p>
            </div>
            <div class="contResumen">

                <div class="cardResumen totalResumen">
                    <span>Total</span>
                    <h2 id="total"></h2>
                </div>

                <div class="cardResumen roboResumen">
                    <span>Robos</span>
                    <h2 id="robos"></h2>
                </div>

                <div class="cardResumen accidenteResumen">
                    <span>Accidentes</span>
                    <h2 id="accidentes"></h2>
                </div>

                <div class="cardResumen piqueResumen">
                    <span>Piques</span>
                    <h2 id="piques"></h2>
                </div>

                <div class="cardResumen agresionResumen">
                    <span>Agresiones</span>
                    <h2 id="agresiones"></h2>
                </div>
                <div class="cardResumen topBarrio">
                    <span>Barrio con más incidentes</span>
                    <h2 id="topBarrio">...</h2>
                </div>

                <div class="cardResumen topVereda">
                    <span>Vereda con más incidentes</span>
                    <h2 id="topVereda">...</h2>
                </div>
            </div>
        </div>
        <div id="panelIncidentes"></div>
    </div>


    <footer>

    </footer>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="dashboard.js"></script>


</body>

</html>
