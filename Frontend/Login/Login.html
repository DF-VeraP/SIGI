<!DOCTYPE html>
<!-- Villareal-117 Facebook -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="EstiloLogin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="fondo contFlexCent">
        <main class="contLogin contFlexCent">
            <section class="slider">
                <div class="divSlider">
                    <img src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcTC5Y6YzrlKWMVSSl71jJ564HUNUYgfS4wzrFsBTqBR7muDtCeNhgNmEDSwO6Rjm0HM4wDR-BwclQ-BTCYt7aMnESFq&s=19" alt="">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_aGy7uiGF5Szf3JZk695hH2_UE4Y-8ndPHw&s" alt="">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROt4gXhFcNMzUgv5FUczseZzqA-NQQo_sC6w&s" alt="">
                    <!-- imagen duplicada para evitar salto -->
                    <img src="https://cristalinacaqueta.com/media/multimedia/caque.jpg" alt="">
                </div>
            </section>
            <section class="formLogin contFlexCentColumn">
                <h1>Analisis de incidentes</h1>
                <p>Acceso para administradores</p>
                <form id="loginForm" class="contFlexCentColumn">
                    <section>
                        <label for="">Usuario</label>
                        <i class="bi bi-person"></i>
                        <input type="text" placeholder="Nombre usuario" id="nameuser">
                    </section>
                    <section>
                        <label for="">Contraseña</label>
                        <i class="bi bi-person-lock"></i>
                        <input type="password" placeholder="• • • • • • • •" id="pssuser">
                    </section>
                    <p id="resp"></p>
                    <button type="submit">
                        Iniciar sesion
                        <i class="bi bi-box-arrow-in-right"></i>
                    </button>
                </form>
            </section>
        </main>
    </div>
    <script src="DomLogin.js"></script>
</body>

</html>
